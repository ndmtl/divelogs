<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logger ses plongées</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont/tabler-icons.min.css">
    <link rel="icon" type="image/png" href="assets/img/taskflow_favicon.png">
    <script src="scripts/script.js" defer></script>
</head>

<body>
    <section class="hero">
        <main class="container">
            <div class="layout-grid">
                <div class="layout-grid__form">
                    <h1 class="main-title">Projet#1 / Log des meilleures plongées</h1>
                    <form novalidate>
                        <ul id="tabs" class="tabs">
                            <li class="tabs__item tabs__item--active">
                                <span class="tabs__round">1</span><span>Début</span>
                            </li>
                            <li class="tabs__item">
                                <span class="tabs__round">2</span><span>Fin</span>
                            </li>
                        </ul>

                        <div class="form-container">
                            <fieldset id="step1" class="form-step form-step--active">
                                <legend class="sr-only">Vos coordonnées</legend>
                                <div class="input-control">
                                    <label class="input-control__label" for="sea">Mer/Ocean*</label>
                                    <select class="input-control__input" id="sea" required>
                                        <option value="">Chargement des mers...</option>
                                    </select>
                                    <div class="input-control__error"></div>
                                </div>
                                <div class="input-control">
                                    <label class="input-control__label" for="spot">Site de plongée*</label>
                                    <input class="input-control__input" type="text" id="spot"
                                        placeholder="Ex: Épave du Rubis" required>
                                    <div class="input-control__error"></div>
                                </div>
                                <div class="input-control">
                                    <label class="input-control__label" for="diveImg">Image d'illustration*</label>
                                    <input class="input-control__input" type="file" id="diveImg" name="diveImg"
                                        accept="image/*">
                                    <div class="input-control__error"></div>
                                </div>
                                <div class="input-control">
                                    <label class="input-control__label" for="buddy">Votre partenaire</label>
                                    <input class="input-control__input" type="text" id="buddy" placeholder="Ex: Jean">
                                    <div class="input-control__error"></div>
                                </div>

                                <button class="button" type="button" id="btnNext">Suivant</button>
                            </fieldset>

                            <fieldset id="step2" class="form-step">
                                <legend class="sr-only">Votre plongée</legend>
                                <div class="input-control">
                                    <label class="input-control__label" for="date">Date*</label>
                                    <input class="input-control__input input-control__input--date" type="date"
                                        id="date">
                                    <div class="input-control__error"></div>
                                </div>

                                <div class="input-control">
                                    <label class="input-control__label" for="duration">Durée (minutes)*</label>
                                    <input class="input-control__input" type="number" id="duration" placeholder="45">
                                    <div class="input-control__error"></div>
                                </div>

                                <div class="input-control">
                                    <label class="input-control__label" for="depth">Profondeur (mètres)*</label>
                                    <input class="input-control__input" type="number" id="depth" placeholder="18">
                                </div>

                                <div class="input-control">
                                    <label class="input-control__label" for="temperature">Temperature (celsius)*</label>
                                    <input class="input-control__input" type="number" id="temperature" placeholder="18">
                                </div>

                                <div class="input-control">
                                    <label class="input-control__label" for="visibility">Visibilité*</label>
                                    <select class="input-control__input" id="visibility">
                                        <option value="">Choisissez</option>
                                        <option value="awesome">Excellente</option>
                                        <option value="good">Bonne</option>
                                        <option value="mixed">Mitigé</option>
                                        <option value="bad">Mauvaise</option>
                                    </select>
                                </div>
                                <div class="form-container__actions">
                                    <button class="button" type="button" id="btnAdd">Soumettre</button>
                                </div>
                            </fieldset>
                        </div>
                    </form>
                </div>

                <div class="layout-grid__display">
                    <div class="log-board">
                        <div id="divesList" class="log-board__list">
                            <div class="flip-card">
                                <div class="flip-card__inner">
                                    <div class="flip-card__front">
                                        <img class="flip-card__img" src="img/dive.jpg" alt="Plongée">
                                        <h2 class="flip-card__title flip-card__title--front">Sea</h2>
                                    </div>
                                    <div class="flip-card__back">
                                        <h2 class="flip-card__title flip-card__title--back" id="result-site">Épave du
                                            Rubis</h2>

                                        <div class="stat">
                                            <i class="ti ti-calendar-event" aria-hidden="true"></i>
                                            <div class="stat__content">
                                                <p class="stat__label">Date</p>
                                                <p class="stat__value" id="result-date">—</p>
                                            </div>
                                        </div>

                                        <div class="stat">
                                            <i class="ti ti-hourglass" aria-hidden="true"></i>
                                            <div class="stat__content">
                                                <p class="stat__label">Durée</p>
                                                <p class="stat__value" id="result-duration">—</p>
                                            </div>
                                        </div>

                                        <div class="stat">
                                            <i class="ti ti-arrow-narrow-down" aria-hidden="true"></i>
                                            <div class="stat__content">
                                                <p class="stat__label">Profondeur</p>
                                                <p class="stat__value" id="result-depth">—</p>
                                            </div>
                                        </div>

                                        <div class="stat">
                                            <i class="ti ti-temperature" aria-hidden="true"></i>
                                            <div class="stat__content">
                                                <p class="stat__label">Température</p>
                                                <p class="stat__value" id="result-temp">—</p>
                                            </div>
                                        </div>

                                        <div class="stat">
                                            <i class="ti ti-eye" aria-hidden="true"></i>
                                            <div class="stat__content">
                                                <p class="stat__label">Visibilité</p>
                                                <p class="stat__value" id="result-visibility">—</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </section>

    <footer class="footer">
        <div class="container">
            <ul class="footer__list">
                <li class="footer__item">Réalisé par Nathalie Depierre</li>
                <li class="footer__item">AEC – Développement Web (NWE.2U) - <a class="footer__link"
                        href="https://www.cegeptr.qc.ca/" target="_blank">Cégep Trois-Rivières</a></li>
            </ul>
        </div>
    </footer>
</body>

</html>
